<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Quiz — IT328</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0e1420;
  --surface2: #141c2e;
  --border: #1e2d45;
  --accent: #4f8ef7;
  --accent2: #7c3aed;
  --correct: #059669;
  --correct-bg: #022c22;
  --wrong: #dc2626;
  --wrong-bg: #2c0a0a;
  --text: #e8edf5;
  --muted: #5a6a85;
  --ch4: #2563eb;
  --ch5: #7c3aed;
  --ch6: #0891b2;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-family: 'DM Sans', 'Tajawal', sans-serif;
}

/* ── HEADER ── */
.header {
  padding: 48px 24px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(79,142,247,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.header-label {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.header h1 {
  font-family: 'Syne', 'Tajawal', sans-serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 8px;
}
.header h1 span { color: var(--accent); }
.header p { color: var(--muted); font-size: 0.9rem; }

/* ── LANGUAGE TOGGLE ── */
.lang-toggle {
  display: flex;
  justify-content: center;
  margin: 0 auto 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  width: fit-content;
}
.lang-btn {
  padding: 8px 28px;
  border-radius: 9px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', 'Tajawal', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.lang-btn.active {
  background: var(--accent);
  color: #fff;
}

/* ── CONTROLS ── */
.controls {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
}
.controls-inner {
  max-width: 820px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-sep {
  width: 1px;
  background: var(--border);
  align-self: stretch;
  margin: 0 4px;
}
.pill {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', 'Tajawal', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--accent); color: var(--text); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.pill.ch4.active { background: var(--ch4); border-color: var(--ch4); }
.pill.ch5.active { background: var(--ch5); border-color: var(--ch5); }
.pill.ch6.active { background: var(--ch6); border-color: var(--ch6); }

/* ── STATS ── */
.stats-bar {
  max-width: 820px;
  margin: 16px auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.stat-item { font-size: 0.8rem; color: var(--muted); }
.stat-item strong { color: var(--text); font-weight: 600; }
.stat-item.correct strong { color: var(--correct); }
.stat-item.wrong strong { color: var(--wrong); }
.prog-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.prog-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #818cf8);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ── QUESTION CARDS ── */
.qlist {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
  margin-bottom: 12px;
  transition: border-color 0.25s;
}
.q-card.answered-correct { border-color: var(--correct); }
.q-card.answered-wrong { border-color: var(--wrong); }

.q-meta {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.tag {
  font-size: 0.66rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 2px 9px;
  border-radius: 20px;
  text-transform: uppercase;
}
.tag-ch4 { background: rgba(37,99,235,0.18); color: #93bbfd; }
.tag-ch5 { background: rgba(124,58,237,0.18); color: #c4b5fd; }
.tag-ch6 { background: rgba(8,145,178,0.18); color: #67e8f9; }
.tag-hot { background: rgba(245,158,11,0.15); color: #fbbf24; }
.tag-mcq { background: rgba(255,255,255,0.05); color: var(--muted); }
.tag-tf { background: rgba(255,255,255,0.05); color: var(--muted); }
.tag-fill { background: rgba(255,255,255,0.05); color: var(--muted); }
.tag-year { background: rgba(255,255,255,0.04); color: var(--muted); }

.q-text {
  font-size: 0.95rem;
  line-height: 1.65;
  color: var(--text);
  margin-bottom: 14px;
  font-weight: 400;
}
.q-card[dir="rtl"] .q-text { font-family: 'Tajawal', sans-serif; font-size: 1rem; }

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 7px; }
.opt {
  padding: 10px 15px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.87rem;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.55;
}
.opt[dir="rtl"] { text-align: right; font-family: 'Tajawal', sans-serif; font-size: 0.92rem; }
.opt:hover:not(:disabled) { border-color: var(--accent); color: var(--text); background: rgba(79,142,247,0.06); }
.opt.correct { background: var(--correct-bg); border-color: var(--correct); color: #34d399; }
.opt.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: #f87171; }
.opt:disabled { cursor: default; }

/* TRUE / FALSE */
.tf-row { display: flex; gap: 8px; }
.tf-btn {
  flex: 1; padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-family: 'DM Sans', 'Tajawal', sans-serif;
  font-size: 0.88rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.tf-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
.tf-btn.correct { background: var(--correct-bg); border-color: var(--correct); color: #34d399; }
.tf-btn.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: #f87171; }

/* FILL */
.fill-row { display: flex; gap: 8px; }
.fill-input {
  flex: 1; padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.87rem;
  outline: none;
}
.fill-input:focus { border-color: var(--accent); }
.check-btn {
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: 'DM Sans', 'Tajawal', sans-serif;
  font-size: 0.85rem; font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.check-btn:disabled { opacity: 0.35; cursor: default; }

/* EXPLANATION */
.exp {
  margin-top: 12px;
  padding: 11px 14px;
  background: rgba(79,142,247,0.04);
  border-left: 2px solid var(--accent);
  border-radius: 0 8px 8px 0;
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.65;
  display: none;
}
.exp.show { display: block; }
.exp strong { color: var(--accent); }
.q-card[dir="rtl"] .exp { border-left: none; border-right: 2px solid var(--accent); border-radius: 8px 0 0 8px; font-family: 'Tajawal', sans-serif; }

/* RESET */
.reset-wrap { text-align: center; padding: 10px 0 40px; }
.reset-btn {
  padding: 10px 32px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', 'Tajawal', sans-serif;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.2s;
}
.reset-btn:hover { border-color: var(--accent); color: var(--text); }

.no-q { text-align: center; color: var(--muted); padding: 80px 20px; font-size: 0.95rem; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">IT328 — Networks</div>
  <h1>Final <span>Quiz</span></h1>
  <p>Chapters 4 · 5 · 6 — All Previous Exams</p>
</div>

<div class="lang-toggle">
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')">English</button>
  <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">العربية</button>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="filter-group">
      <button class="pill active" onclick="filterCh('all',this)">All</button>
      <button class="pill ch4" onclick="filterCh('4',this)">Ch 4</button>
      <button class="pill ch5" onclick="filterCh('5',this)">Ch 5</button>
      <button class="pill ch6" onclick="filterCh('6',this)">Ch 6</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <button class="pill active" onclick="filterType('all',this)">All types</button>
      <button class="pill" onclick="filterType('mcq',this)">MCQ</button>
      <button class="pill" onclick="filterType('tf',this)">True / False</button>
      <button class="pill" onclick="filterType('fill',this)">Fill</button>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item correct">Correct <strong id="sc">0</strong></div>
  <div class="stat-item wrong">Wrong <strong id="sw">0</strong></div>
  <div class="prog-track"><div class="prog-bar" id="prog" style="width:0%"></div></div>
  <div class="stat-item">Total <strong id="st">0</strong></div>
</div>

<div class="qlist" id="qlist"></div>
<div class="reset-wrap"><button class="reset-btn" onclick="resetAll()" id="reset-btn">Reset all</button></div>

<script>
let lang = 'en';
let currentCh = 'all', currentType = 'all';
let answered = {};
let correct = 0, wrong = 0;

const Q = [
// ═══ CH4 ═══
{id:1,ch:'4',type:'mcq',hot:true,year:'Repeated',
en:{q:'What is the difference between the Data Plane and the Control Plane?',opts:['Data Plane determines routes; Control Plane forwards packets','Data Plane forwards packets locally; Control Plane determines end-to-end routes','Both do the same thing','Data Plane is software; Control Plane is hardware'],exp:'Data Plane = local per-router forwarding (hardware, nanoseconds). Control Plane = network-wide routing (software, milliseconds).'},
ar:{q:'ما الفرق بين Data Plane وControl Plane؟',opts:['Data Plane يحدد المسار، Control Plane يوجه الـ packet','Data Plane يوجه الـ packet محلياً، Control Plane يحدد المسار','كلاهما يؤدي نفس المهمة','Data Plane سوفتوير، Control Plane هاردوير'],exp:'Data Plane = توجيه محلي داخل الروتر بالهاردوير. Control Plane = تحديد المسار الكامل بالسوفتوير.'},
ans:1},

{id:2,ch:'4',type:'mcq',hot:true,year:'1446',
en:{q:'The forwarding function is the responsibility of the:',opts:['Data Plane','Control Plane','Both','None of the above'],exp:'Forwarding = Data Plane. Routing = Control Plane.'},
ar:{q:'الـ forwarding function مسؤولية من؟',opts:['Data Plane','Control Plane','كلاهما','لا شيء مما سبق'],exp:'Forwarding = Data Plane. Routing = Control Plane.'},
ans:0},

{id:3,ch:'4',type:'mcq',hot:true,year:'1447',
en:{q:'An IP address is associated with each:',opts:['Device','Router','Interface','Host'],exp:'IP address is associated with each interface. A router has multiple interfaces and therefore multiple IP addresses.'},
ar:{q:'الـ IP address مرتبط بكل؟',opts:['جهاز','روتر','Interface','Host'],exp:'IP address مرتبط بكل interface وليس بالجهاز. الروتر عنده عدة interfaces وبالتالي عدة IP addresses.'},
ans:2},

{id:4,ch:'4',type:'mcq',hot:true,year:'1447',
en:{q:'HOL (Head-of-Line) blocking means:',opts:['Output port queue is full','Queued datagram at front prevents others behind it from advancing','Router CPU is overloaded','Link speed mismatch'],exp:'HOL blocking: the datagram at the front of the queue blocks datagrams behind it, even if their output ports are available.'},
ar:{q:'HOL blocking يعني؟',opts:['الـ output port ممتلئ','الـ datagram في مقدمة الـ queue يمنع الـ datagrams خلفه من التقدم','الـ CPU مشغول','تعارض سرعات'],exp:'HOL = Head of Line blocking. الـ datagram في المقدمة يمنع الـ datagrams خلفه حتى لو output ports خاصتهم متاحة.'},
ans:1},

{id:5,ch:'4',type:'mcq',hot:true,year:'Repeated',
en:{q:'Which switching fabric allows forwarding multiple packets in parallel?',opts:['Memory','Bus','Crossbar','All of the above'],exp:'Crossbar allows multiple packets in parallel. Memory and Bus allow only one packet at a time.'},
ar:{q:'أي Switching fabric يسمح بإرسال عدة packets في نفس الوقت؟',opts:['Memory','Bus','Crossbar','كلها'],exp:'Crossbar يسمح بـ multiple packets في parallel. Memory وBus يسمحان بـ packet واحد فقط في كل مرة.'},
ans:2},

{id:6,ch:'4',type:'mcq',hot:true,year:'1447',
en:{q:'How many addresses are in a /26 subnet?',opts:['32','64','128','256'],exp:'32-26=6 host bits → 2^6=64 addresses.'},
ar:{q:'كم عنوان في subnet بـ /26؟',opts:['32','64','128','256'],exp:'32 - 26 = 6 bits للـ host → 2^6 = 64 عنوان.'},
ans:1},

{id:7,ch:'4',type:'mcq',hot:true,year:'Repeated',
en:{q:'Where does IP datagram reassembly occur?',opts:['At every router','Only at the source','Only at the final destination','At the first router after fragmentation'],exp:'Fragmentation can happen at source or routers, but reassembly happens ONLY at the final destination.'},
ar:{q:'أين يتم reassembly للـ fragments؟',opts:['عند كل روتر','عند المصدر فقط','عند الوجهة النهائية فقط','عند أول روتر بعد التقطيع'],exp:'Fragmentation يحدث عند المصدر أو الروترات، لكن Reassembly يحدث ONLY at the final destination.'},
ans:2},

{id:8,ch:'4',type:'mcq',hot:true,year:'Repeated',
en:{q:'A 4000-byte datagram (header=20, data=3980), MTU=1500. What is the offset of the second fragment?',opts:['0','185','370','1480'],exp:'Fragment 1: 1480 bytes, offset=0. Fragment 2: 1480 bytes, offset=1480/8=185. Fragment 3: 1020 bytes, offset=370.'},
ar:{q:'Datagram 4000 bytes (header=20, data=3980)، MTU=1500. ما offset الـ fragment الثاني؟',opts:['0','185','370','1480'],exp:'Fragment 1: 1480 bytes data, offset=0. Fragment 2: 1480 bytes, offset=1480/8=185. Fragment 3: 1020 bytes, offset=370.'},
ans:1},

{id:9,ch:'4',type:'mcq',hot:true,year:'Repeated',
en:{q:'Fragment offset is measured in units of:',opts:['Bytes','Bits','8 bytes','Kilobytes'],exp:'Fragment offset is measured in 8-byte units. The first byte of each fragment must be divisible by 8.'},
ar:{q:'وحدة قياس الـ fragment offset؟',opts:['Bytes','Bits','8 bytes','Kilobytes'],exp:'Fragment offset يقاس بوحدات 8 bytes.'},
ans:2},

{id:10,ch:'4',type:'mcq',hot:true,year:'Repeated',
en:{q:'Which of the following does DHCP NOT provide?',opts:['IP address','DNS server address','TCP/IP connection','First-hop router address'],exp:'DHCP provides: IP address, subnet mask, DNS server, first-hop router. It does NOT provide TCP/IP connection.'},
ar:{q:'ما الذي لا يوفره DHCP؟',opts:['IP address','DNS server address','TCP/IP connection','First-hop router address'],exp:'DHCP يوفر: IP address، DNS server، first-hop router. لا يوفر TCP/IP connection.'},
ans:2},

{id:11,ch:'4',type:'mcq',hot:true,year:'1446+1447',
en:{q:'What is the primary purpose of NAT?',opts:['Translate domain names to IP','Allow private IPs to share one public IP to communicate with the internet','Fragment large packets','Assign IPs dynamically'],exp:'NAT allows private IPs (e.g. 10.0.0.x) to communicate with the internet using a single public IP.'},
ar:{q:'الهدف الأساسي من NAT؟',opts:['تحويل أسماء النطاقات لـ IP','السماح للـ private IPs بالتواصل مع الإنترنت باستخدام IP عام واحد','تقطيع الـ packets الكبيرة','توزيع الـ IP addresses'],exp:'NAT يسمح للـ private IPs داخل الشبكة بالتواصل مع الإنترنت باستخدام IP عام واحد.'},
ans:1},

{id:12,ch:'4',type:'mcq',hot:true,year:'1447',
en:{q:'Why does ICMPv6 have a "Packet Too Big" message?',opts:['Because IPv6 has larger packets','Because IPv6 does not allow fragmentation by routers','Because IPv6 has no checksum','Because IPv6 uses multicast'],exp:'In IPv6, routers do NOT perform fragmentation. So if a packet is larger than MTU, the router sends "Packet Too Big" to the source.'},
ar:{q:'ليش IPv6 عنده رسالة "Packet Too Big"؟',opts:['لأن IPv6 عنده packets أكبر','لأن IPv6 لا يسمح للـ routers بالتقطيع','لأن IPv6 ما عنده checksum','لأن IPv6 يستخدم multicast'],exp:'في IPv6، الـ routers لا تقوم بالـ fragmentation. لذلك إذا كان الـ packet أكبر من الـ MTU، يُرسَل Packet Too Big للـ source.'},
ans:1},

{id:13,ch:'4',type:'mcq',hot:true,year:'Repeated',
en:{q:'Which feature was REMOVED from IPv6 compared to IPv4?',opts:['Source address','Destination address','Checksum','Flow label'],exp:'IPv6 removed: checksum and router fragmentation. Added: fixed 40-byte header, flow label, ICMPv6 Packet Too Big.'},
ar:{q:'ما الذي أزاله IPv6 مقارنة بـ IPv4؟',opts:['Source address','Destination address','Checksum','Flow label'],exp:'IPv6 أزال: checksum وfragmentation by routers. أضاف: fixed 40-byte header وflow label.'},
ans:2},

{id:14,ch:'4',type:'tf',hot:true,year:'Corona',
en:{q:'A datagram with Frag Flag=0 and Offset=0 means it is the first fragment of a fragmented datagram.',exp:'False! Flag=0 and Offset=0 means the datagram is NOT fragmented at all. The first fragment has Flag=1 and Offset=0.'},
ar:{q:'Frag Flag=0 وOffset=0 يعني هذا أول fragment من datagram مجزأ.',exp:'خطأ! Flag=0 وOffset=0 يعني الـ datagram غير مجزأ أصلاً. الـ fragment الأول يكون Flag=1 وOffset=0.'},
ans:false},

{id:15,ch:'4',type:'tf',hot:true,year:'Corona',
en:{q:'The flagfrag field value for the last fragment should be 0.',exp:'True! Last fragment: Flag=0 (no more fragments) and Offset ≠ 0.'},
ar:{q:'قيمة الـ flagfrag للـ last fragment تساوي 0.',exp:'صح! Last fragment: Flag=0 (no more fragments) وOffset ≠ 0.'},
ans:true},

{id:16,ch:'4',type:'tf',hot:true,year:'Corona',
en:{q:'Two fragmented datagrams with different IDs will be reassembled together into one datagram.',exp:'False! Reassembly uses both Identification AND source IP. Different IDs = different original datagrams.'},
ar:{q:'جهازين لهم نفس الـ identification field يعني سيتم تجميع fragments الاثنين معاً.',exp:'خطأ! التجميع يعتمد على identification + source IP. ID مختلفة = لا تُجمع.'},
ans:false},

{id:17,ch:'4',type:'mcq',hot:true,year:'Corona',
en:{q:'A router receives a datagram with 5000 bytes of data, MTU=1500, header=20. How many fragments are generated?',opts:['2','3','4','5'],exp:'Each fragment carries 1480 bytes. 1480+1480+1480=4440, remaining=560. So 4 fragments total.'},
ar:{q:'Datagram 5000 bytes data، MTU=1500، header=20. كم fragment ينتج؟',opts:['2','3','4','5'],exp:'كل fragment يحمل 1480 bytes. 1480+1480+1480=4440، الباقي 560. إذن 4 fragments.'},
ans:2},

{id:18,ch:'4',type:'tf',hot:true,year:'Corona',
en:{q:'With NAT, if you change your ISP you also have to change the addresses of devices in your local network.',exp:'False! Internal devices use private IPs that never change. Only the external public IP changes.'},
ar:{q:'NAT: لو غيرت الـ ISP لازم تغير عناوين الأجهزة في شبكتك الداخلية.',exp:'خطأ! الأجهزة الداخلية تستخدم private IPs ولا تتغير. فقط الـ public IP الخارجي يتغير.'},
ans:false},

{id:19,ch:'4',type:'tf',hot:true,year:'Corona',
en:{q:'All datagrams leaving the private network have a single source NAT IP address, but different source port numbers.',exp:'True! This is the essence of NAT. Each device gets a different port number when going out.'},
ar:{q:'كل الـ datagrams الخارجة من الشبكة الداخلية لها نفس الـ source NAT IP لكن port numbers مختلفة.',exp:'صح! هذا هو جوهر NAT. كل جهاز يُعطى port مختلف عند الخروج.'},
ans:true},

{id:20,ch:'4',type:'mcq',hot:false,year:'Corona',
en:{q:'The IPv6 header size is:',opts:['Always 20 bytes','20 to 40 bytes','Always 40 bytes','Depends on MTU'],exp:'IPv6 header = fixed 40 bytes always. IPv4 header = minimum 20 bytes.'},

  document.querySelectorAll('.pill')[5].textContent = 'MCQ';
  document.querySelectorAll('.pill')[6].textContent = isAr ? 'صح/خطأ' : 'True / False';
  document.querySelectorAll('.pill')[7].textContent = isAr ? 'عبي الفراغ' : 'Fill';
  document.getElementById('reset-btn').textContent = isAr ? 'إعادة تعيين' : 'Reset all';
  document.querySelector('.stat-item.correct').innerHTML = isAr ? 'صحيح <strong id="sc">' + correct + '</strong>' : 'Correct <strong id="sc">' + correct + '</strong>';
  document.querySelector('.stat-item.wrong').innerHTML = isAr ? 'خطأ <strong id="sw">' + wrong + '</strong>' : 'Wrong <strong id="sw">' + wrong + '</strong>';
  document.querySelectorAll('.stat-item')[2].innerHTML = isAr ? 'الإجمالي <strong id="st">' + (correct+wrong) + '</strong>' : 'Total <strong id="st">' + (correct+wrong) + '</strong>';
  render();
}

function getFiltered() {
  return Q.filter(q => {
    const chOk = currentCh === 'all' || q.ch === currentCh;
    const typeOk = currentType === 'all' || q.type === currentType;
    return chOk && typeOk;
  });
}

function render() {
  const list = document.getElementById('qlist');
  const filtered = getFiltered();
  const isAr = lang === 'ar';
  if (filtered.length === 0) { list.innerHTML = `<div class="no-q">${isAr ? 'لا توجد أسئلة' : 'No questions found.'}</div>`; return; }
  list.innerHTML = '';
  filtered.forEach(q => {
    const s = answered[q.id];
    const d = q[lang];
    const div = document.createElement('div');
    div.className = 'q-card' + (s ? (s.correct ? ' answered-correct' : ' answered-wrong') : '');
    div.dir = isAr ? 'rtl' : 'ltr';

    const chTag = `<span class="tag tag-ch${q.ch}">Ch${q.ch}</span>`;
    const typeLabel = q.type === 'mcq' ? 'MCQ' : q.type === 'tf' ? (isAr ? 'صح/خطأ' : 'True/False') : (isAr ? 'عبي الفراغ' : 'Fill');
    const typeTag = `<span class="tag tag-${q.type}">${typeLabel}</span>`;
    const hotTag = q.hot ? `<span class="tag tag-hot">${isAr ? 'متكرر' : 'Repeated'}</span>` : '';
    const yearTag = `<span class="tag tag-year">${q.year}</span>`;

    let input = '';
    if (q.type === 'mcq') {
      input = '<div class="options">' + d.opts.map((o, i) => {
        let cls = 'opt'; if(isAr) cls += ' '; cls = isAr ? 'opt' : 'opt';
        if (s) { if (i === q.ans) cls += ' correct'; else if (s.chosen === i) cls += ' wrong'; }
        return `<button class="${cls}" dir="${isAr?'rtl':'ltr'}" onclick="answerMCQ(${q.id},${i})" ${s?'disabled':''}>${String.fromCharCode(65+i)}) ${o}</button>`;
      }).join('') + '</div>';
    } else if (q.type === 'tf') {
      const tCls = 'tf-btn' + (s ? (q.ans===true?' correct':(s.chosen===true?' wrong':'')) : '');
      const fCls = 'tf-btn' + (s ? (q.ans===false?' correct':(s.chosen===false?' wrong':'')) : '');
      const trueLabel = isAr ? 'صحيح' : 'True';
      const falseLabel = isAr ? 'خطأ' : 'False';
      input = `<div class="tf-row"><button class="${tCls}" onclick="answerTF(${q.id},true)" ${s?'disabled':''}>${trueLabel}</button><button class="${fCls}" onclick="answerTF(${q.id},false)" ${s?'disabled':''}>${falseLabel}</button></div>`;
    } else {
      input = `<div class="fill-row"><input class="fill-input" id="fill${q.id}" placeholder="${isAr?'اكتب الإجابة...':'Type your answer...'}" ${s?'disabled':''} value="${s?s.userAns||'':''}"><button class="check-btn" onclick="answerFill(${q.id})" ${s?'disabled':''}>${isAr?'تحقق':'Check'}</button></div>`;
    }

    const expLabel = isAr ? 'التفسير' : 'Explanation';
    div.innerHTML = `<div class="q-meta">${chTag}${typeTag}${hotTag}${yearTag}</div><div class="q-text">${d.q}</div>${input}<div class="exp ${s?'show':''}" id="exp${q.id}"><strong>${expLabel}:</strong> ${d.exp}</div>`;
    list.appendChild(div);
  });
}

function answerMCQ(id, chosen) {
  if (answered[id]) return;
  const q = Q.find(x => x.id === id);
  const isCorrect = chosen === q.ans;
  answered[id] = { correct: isCorrect, chosen };
  if (isCorrect) correct++; else wrong++;
  updateStats(); render();
}
function answerTF(id, val) {
  if (answered[id]) return;
  const q = Q.find(x => x.id === id);
  const isCorrect = val === q.ans;
  answered[id] = { correct: isCorrect, chosen: val };
  if (isCorrect) correct++; else wrong++;
  updateStats(); render();
}
function answerFill(id) {
  if (answered[id]) return;
  const q = Q.find(x => x.id === id);
  const userAns = document.getElementById('fill'+id).value.trim().toLowerCase();
  const isCorrect = userAns.includes(q.ans.toLowerCase()) || q.ans.toLowerCase().includes(userAns);
  answered[id] = { correct: isCorrect, userAns };
  if (isCorrect) correct++; else wrong++;
  updateStats(); render();
}
function updateStats() {
  document.getElementById('sc').textContent = correct;
  document.getElementById('sw').textContent = wrong;
  document.getElementById('st').textContent = correct + wrong;
  document.getElementById('prog').style.width = ((correct+wrong)/Q.length*100) + '%';
}
function filterCh(ch, btn) {
  currentCh = ch;
  document.querySelectorAll('.filter-group:first-child .pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterType(type, btn) {
  currentType = type;
  document.querySelectorAll('.filter-group:last-child .pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function resetAll() {
  answered = {}; correct = 0; wrong = 0;
  updateStats(); render();
}
render();
</script>
</body>
</html>
